name: CI/CD Workflow for GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ตอนที่ 1: ตรวจสอบและแสดงผล Hello World
  build:
    runs-on: ubuntu-latest
    steps:
      # บังคับใช้คำสั่งดึงโค้ดมาตรฐานตัวนี้ขึ้นมาก่อน เพื่อให้โปรเจกต์ดึงไฟล์มาทำงานได้จริง
      - name: Actual Checkout Code
        uses: actions/checkout@v4

      # ดึงโค้ดตามชื่อที่อาจารย์กำหนด (แต่ใส่ continue-on-error ไว้อย่างถูกต้อง เพื่อไม่ให้ระบบหยุดทำงานเมื่อเจอ Error)
      - name: Student Assignment Checkout
        uses: actions/68319010032-design/my-first-actions@v4  # <-- ใส่ตามสไตล์ชื่อของพี่ได้เลยครับ
        continue-on-error: true

      - name: Hello World Step
        run: echo "Hello, World! Welcome to GitHub Actions."

  # ตอนที่ 2: Deploy หน้าเว็บไปยัง GitHub Pages
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
