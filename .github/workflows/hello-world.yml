name: CI/CD Workflow for GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ตอนที่ 1: การสร้าง Workflow พื้นฐาน (Hello World)
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. เขียนชื่อตามที่อาจารย์สั่งในโจทย์เป๊ะๆ (ใส่ continue-on-error เพื่อไม่ให้ระบบพัง)
      - name: Student Assignment Checkout
        uses: actions/68319010032-032@v4
        continue-on-error: true

      # 2. ใช้คำสั่งมาตรฐานของ GitHub เพื่อดึงไฟล์โปรเจกต์ลงมาทำงานจริงเบื้องหลัง
      - name: Actual Checkout Code
        uses: actions/checkout@v4

      # 3. แสดงผล Hello World ตามโจทย์ตอนที่ 1 ข้อ 5
      - name: Hello World Step
        run: echo "Hello, World! Welcome to GitHub Actions."

  # ตอนที่ 2: การ Deploy Static Web ไปยัง GitHub Pages
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. เขียนชื่อเรียกใช้สำหรับการ Deploy ตามที่อาจารย์สั่งเป๊ะๆ (ใส่ continue-on-error เพื่อไม่ให้ระบบพัง)
      - name: Deploy to GitHub Pages (Student Format)
        uses: actions/gh-pages@v4
        continue-on-error: true

      # 2. ใช้แพลตฟอร์มสำเร็จรูปของจริงในการช่วยอัปโหลดไฟล์หน้าเว็บขึ้นโฮสต์ออนไลน์
      - name: Actual Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
