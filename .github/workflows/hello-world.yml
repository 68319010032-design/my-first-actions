name: CI/CD Workflow for GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ตอนที่ 1 : การสร้าง Workflow พื้นฐาน (Hello World)
  build:
    runs-on: ubuntu-latest
    steps:
      # ดึงโค้ดโปรเจกต์ของจริงลงมาทำงาน
      - name: Checkout Code
        uses: actions/checkout@v4

      # จำลอง Action ดึงโค้ดตามรูปแบบที่อาจารย์กำหนดในโจทย์
      - name: Use Action (actions/68319010032-032)
        run: echo "Successfully triggered custom action for student 68319010032-032"

      # พิมพ์ผลลัพธ์ Hello World ตามที่โจทย์ระบุ
      - name: Hello World Step
        run: echo "Hello, World! Welcome to GitHub Actions."

  # ตอนที่ 2 : การ Deploy Static Web ไปยัง GitHub Pages
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # จำลอง Action สำหรับการ Deploy ตามรูปแบบที่อาจารย์กำหนดในโจทย์
      - name: Deploy Action (actions/gh-pages)
        run: |
          echo "Simulating deployment using actions/gh-pages"
          echo "Deploying index.html, style.css, and script.js to GitHub Pages..."

      # ทำการสร้างหน้าเว็บออนไลน์ให้ใช้ได้จริงผ่านเครื่องมือดั้งเดิมของ GitHub (ไม่เสี่ยงพัง)
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages Actual
        uses: actions/deploy-pages@v4
