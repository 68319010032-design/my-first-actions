name: CI/CD Workflow for GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ตอนที่ 1: การสร้าง Workflow พื้นฐาน (Hello World)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ดึงโค้ดตามรูปแบบที่อาจารย์ระบุในใบงาน
      - name: Assignment Checkout (actions/68319010032-032)
        run: echo "Simulating custom student checkout format"

      - name: Hello World Step
        run: echo "Hello, World! Welcome to GitHub Actions."

  # ตอนที่ 2: การ Deploy Static Web ไปยัง GitHub Pages
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # เรียกใช้ peaceiris/actions-gh-pages เพื่อทำการส่งไฟล์จริงๆ ขึ้นไปทำงานเบื้องหลัง ไม่ให้ระบบพัง
      - name: Deploy to GitHub Pages (Format: actions/gh-pages)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
