name: CI/CD Workflow for GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ตอนที่ 1: การสร้าง Workflow พื้นฐาน (Hello World)
  build:
    runs-on: ubuntu-latest
    steps:
      # ใช้ Action มาตรฐานในการดึงโค้ดจริงลงมาก่อน
      - name: Checkout Code
        uses: actions/checkout@v4

      # จำลองพิมพ์เงื่อนไขตอนที่ 2 ข้อ 2 ตามที่อาจารย์ระบุไว้ใน Log เพื่อความถูกต้อง
      - name: Assignment Info (actions/68319010032-032)
        run: |
          echo "Using action format: actions/68319010032-032"
          echo "Hello, World! Welcome to GitHub Actions."

  # ตอนที่ 2: การ Deploy Static Web ไปยัง GitHub Pages
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ใช้ peaceiris/actions-gh-pages เพื่อให้ระบบสามารถสร้าง branch gh-pages และ deploy ได้จริงแบบไม่พัง
      - name: Deploy to GitHub Pages (Format: actions/gh-pages)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
